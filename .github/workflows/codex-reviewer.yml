name: Codex PR Reviewer

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    # Only run for PRs targeting main
    if: github.base_ref == 'main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          persist-credentials: false

      - name: Run Codex Review
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            You are a Senior Software Architect reviewing a pull request for the linkedin-mcp project.
            Review the code changes for:
            1. Logic bugs, syntax issues, or typos.
            2. Security vulnerabilities (OWASP top 10, secrets leakage, etc.).
            3. Compliance with clean code practices.
            4. Performance bottlenecks.
            
            Provide a clear summary of your findings.
            At the very end of your review:
            - If the code is correct, safe, and ready to be merged, write 'DECISION: APPROVE' on a new line.
            - If there are issues that must be fixed before merging, write 'DECISION: REQUEST_CHANGES' on a new line.
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Post PR Review
        uses: actions/github-script@v7
        with:
          script: |
            const finalMessage = `${{ steps.run_codex.outputs.final-message }}`;
            
            let event = 'COMMENT';
            let decisionMsg = '';
            
            if (finalMessage.includes('DECISION: APPROVE')) {
              event = 'APPROVE';
              decisionMsg = '\n\n🤖 **Codex Decision:** Approved! Ready to merge.';
            } else if (finalMessage.includes('DECISION: REQUEST_CHANGES')) {
              event = 'REQUEST_CHANGES';
              decisionMsg = '\n\n🤖 **Codex Decision:** Request Changes. Please fix the highlighted issues.';
            }
            
            // Clean up the decision markers from the body text
            const bodyText = finalMessage
              .replace('DECISION: APPROVE', '')
              .replace('DECISION: REQUEST_CHANGES', '')
              .trim() + decisionMsg;

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_request_number: context.issue.number,
              event: event,
              body: bodyText
            });
